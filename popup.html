<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" class="logo" alt="">
    <span class="title">Feedpin</span>
  </div>
  <div class="row">
    <div>
      <div class="label">Enabled</div>
      <div class="site" id="site"></div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggle" checked aria-label="Enable Feedpin on this site">
      <span class="slider"></span>
    </label>
  </div>
  <div class="sep"></div>
  <div class="row">
    <div>
      <div class="label">Dev only</div>
      <div class="hint">localhost, 127.0.0.1, .local</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="devonly" aria-label="Dev environments only">
      <span class="slider"></span>
    </label>
  </div>
  <div class="sep"></div>
  <div class="links">
    <a class="link" id="privacy" href="https://mocreac.com/privacy-policy" target="_blank">Privacy Policy <span class="link-arrow">&#x2197;</span></a>
    <a class="link" href="https://github.com/mocreac/feedpin" target="_blank">Source <span class="link-arrow">&#x2197;</span></a>
  </div>
  <div class="footer">
    <span class="made-by">Made by <a href="https://mocreac.com" target="_blank">George Mocreac</a></span>
    <span class="version">v1.0</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
